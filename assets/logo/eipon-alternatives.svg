<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1540" role="img" aria-labelledby="title desc">
  <title id="title">エイポン logo alternatives</title>
  <desc id="desc">Six alternative logo directions for the English habit app エイポン.</desc>
  <defs>
    <linearGradient id="mintA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5edbd2"/>
      <stop offset="1" stop-color="#168a8b"/>
    </linearGradient>
    <linearGradient id="limeA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b9eb62"/>
      <stop offset="1" stop-color="#44b678"/>
    </linearGradient>
    <linearGradient id="coralA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffb65d"/>
      <stop offset="1" stop-color="#ff6f61"/>
    </linearGradient>
    <linearGradient id="blueA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6fb7ff"/>
      <stop offset="1" stop-color="#3264d9"/>
    </linearGradient>
    <linearGradient id="inkA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22354a"/>
      <stop offset="1" stop-color="#102332"/>
    </linearGradient>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#18333a" flood-opacity=".13"/>
    </filter>
    <filter id="markShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#18333a" flood-opacity=".16"/>
    </filter>
    <style>
      .bg{fill:#f6fbfa}
      .card{fill:#fff;stroke:#dcecea;stroke-width:2;filter:url(#cardShadow)}
      .label{font-family:Hiragino Sans,Yu Gothic,Meiryo,Noto Sans JP,sans-serif;font-size:28px;font-weight:800;fill:#173b42}
      .note{font-family:Hiragino Sans,Yu Gothic,Meiryo,Noto Sans JP,sans-serif;font-size:18px;font-weight:600;fill:#739094}
      .word{font-family:Hiragino Sans,Yu Gothic,Meiryo,Noto Sans JP,sans-serif;font-size:72px;font-weight:900;letter-spacing:3px;fill:#173b42}
      .word2{font-family:Hiragino Sans,Yu Gothic,Meiryo,Noto Sans JP,sans-serif;font-size:62px;font-weight:900;letter-spacing:2px;fill:#173b42}
      .en{font-family:Montserrat,Arial,sans-serif;font-weight:800}
    </style>
  </defs>
  <rect class="bg" width="1200" height="1540"/>
  <text x="80" y="80" class="label" font-size="34">エイポン ロゴ別案</text>
  <text x="80" y="116" class="note">前回よりも方向性を広げて、アプリ名の見え方と習慣化のニュアンスを分けた案です。</text>

  <!-- A -->
  <g transform="translate(80 160)">
    <rect class="card" width="500" height="350" rx="34"/>
    <text x="34" y="58" class="label">A. ミニマル通知</text>
    <text x="34" y="86" class="note">大人っぽく、毎日使うアプリ感を優先</text>
    <g transform="translate(70 136)">
      <rect x="0" y="18" width="105" height="82" rx="34" fill="url(#mintA)" filter="url(#markShadow)"/>
      <path d="M36 99 24 130 65 101" fill="url(#mintA)"/>
      <text x="31" y="76" class="en" font-size="50" fill="#fff">E</text>
      <circle cx="97" cy="12" r="26" fill="#ffba43"/>
      <text x="89" y="24" class="en" font-size="32" fill="#fff">1</text>
      <text x="138" y="82" class="word">エイ<tspan fill="#ffba43">ポ</tspan>ン</text>
      <path d="M145 105c54 22 159 22 214 0" fill="none" stroke="#5edbd2" stroke-width="8" stroke-linecap="round"/>
    </g>
  </g>

  <!-- B -->
  <g transform="translate(620 160)">
    <rect class="card" width="500" height="350" rx="34"/>
    <text x="34" y="58" class="label">B. 習慣ループ</text>
    <text x="34" y="86" class="note">「続く」「積み上がる」を一番伝える案</text>
    <g transform="translate(58 132)">
      <circle cx="75" cy="75" r="64" fill="#eef9ee"/>
      <path d="M128 75a53 53 0 1 1-14-36" fill="none" stroke="url(#limeA)" stroke-width="18" stroke-linecap="round"/>
      <path d="M119 18 120 54 153 43" fill="url(#limeA)"/>
      <text x="43" y="97" font-family="Hiragino Sans,Yu Gothic,Meiryo,sans-serif" font-size="62" font-weight="900" fill="#173b42">英</text>
      <text x="168" y="83" class="word">エイ<tspan fill="#4dbd78">ポ</tspan>ン</text>
      <text x="174" y="122" class="note">英語を毎日のループに</text>
    </g>
  </g>

  <!-- C -->
  <g transform="translate(80 550)">
    <rect class="card" width="500" height="350" rx="34"/>
    <text x="34" y="58" class="label">C. ポン！ワードマーク</text>
    <text x="34" y="86" class="note">カタカナの親しみやすさを主役にする案</text>
    <g transform="translate(54 138)">
      <text x="0" y="86" font-family="Hiragino Maru Gothic ProN,Hiragino Sans,Yu Gothic,Meiryo,sans-serif" font-size="86" font-weight="900" letter-spacing="1" fill="#173b42">エイ<tspan fill="#ff7b61">ポ</tspan>ン</text>
      <circle cx="272" cy="28" r="34" fill="url(#coralA)"/>
      <text x="254" y="39" font-family="Hiragino Sans,Yu Gothic,Meiryo,sans-serif" font-size="24" font-weight="900" fill="#fff">!</text>
      <path d="M307 13 326 -6M318 42l29 2M298 68l18 24" stroke="#ff7b61" stroke-width="8" stroke-linecap="round"/>
      <rect x="16" y="114" width="310" height="16" rx="8" fill="#ffe5da"/>
      <rect x="16" y="114" width="180" height="16" rx="8" fill="#ffb65d"/>
      <text x="24" y="158" class="note">ポンと出て、サッと答える</text>
    </g>
  </g>

  <!-- D -->
  <g transform="translate(620 550)">
    <rect class="card" width="500" height="350" rx="34"/>
    <text x="34" y="58" class="label">D. クイズカード</text>
    <text x="34" y="86" class="note">「質問に答える」体験が一番伝わる案</text>
    <g transform="translate(62 125)">
      <rect x="24" y="24" width="128" height="104" rx="24" fill="#dbe8ff" transform="rotate(-8 88 76)"/>
      <rect x="0" y="0" width="128" height="104" rx="24" fill="url(#blueA)" filter="url(#markShadow)"/>
      <text x="31" y="66" class="en" font-size="40" fill="#fff">Q</text>
      <text x="73" y="66" class="en" font-size="40" fill="#fff">A</text>
      <path d="M31 82h67" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity=".8"/>
      <text x="170" y="83" class="word">エイ<tspan fill="#3264d9">ポ</tspan>ン</text>
      <text x="176" y="122" class="note">1問でひらく英語習慣</text>
    </g>
  </g>

  <!-- E -->
  <g transform="translate(80 940)">
    <rect class="card" width="500" height="350" rx="34"/>
    <text x="34" y="58" class="label">E. スマート学習</text>
    <text x="34" y="86" class="note">かわいさを抑えた、少し知的な方向</text>
    <g transform="translate(58 132)">
      <rect x="0" y="0" width="142" height="142" rx="38" fill="url(#inkA)" filter="url(#markShadow)"/>
      <path d="M38 47h65M38 74h42M38 101h58" stroke="#fff" stroke-width="11" stroke-linecap="round"/>
      <circle cx="108" cy="35" r="22" fill="#68dbd6"/>
      <text x="101" y="44" class="en" font-size="27" fill="#102332">?</text>
      <text x="172" y="83" class="word">エイ<tspan fill="#35bcb8">ポ</tspan>ン</text>
      <text x="178" y="122" class="note">通知から始まるアウトプット</text>
    </g>
  </g>

  <!-- F -->
  <g transform="translate(620 940)">
    <rect class="card" width="500" height="350" rx="34"/>
    <text x="34" y="58" class="label">F. 成長スプラウト</text>
    <text x="34" y="86" class="note">習慣が育つ・英語力が伸びるニュアンス</text>
    <g transform="translate(55 128)">
      <circle cx="76" cy="76" r="72" fill="#fff7da"/>
      <path d="M76 116V58" stroke="#4dbd78" stroke-width="15" stroke-linecap="round"/>
      <path d="M74 70c-42-4-50-38-48-50 32 1 54 16 54 48" fill="#7adf86"/>
      <path d="M80 72c43-4 56-36 56-56-36 3-58 20-58 55" fill="#4dbd78"/>
      <path d="M46 119h62" stroke="#ffbd45" stroke-width="13" stroke-linecap="round"/>
      <text x="170" y="83" class="word">エイ<tspan fill="#4dbd78">ポ</tspan>ン</text>
      <text x="176" y="122" class="note">ちいさな英語が毎日育つ</text>
    </g>
  </g>

  <text x="80" y="1378" class="label">おすすめの見方</text>
  <text x="80" y="1420" class="note">サービスのわかりやすさなら D、習慣化の意味を込めるなら B、アプリ名の親しみやすさなら C、長く使うブランド感なら A / E が向いています。</text>
</svg>
